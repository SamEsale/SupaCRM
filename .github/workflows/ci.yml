name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: supacrm
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d supacrm"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      ENV: prod
      DEBUG: "false"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: supacrm
      DATABASE_APP_USER: supacrm_app
      DATABASE_APP_PASSWORD: supacrm_app
      DATABASE_URL_SYNC: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/supacrm
      DATABASE_URL_ASYNC: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/supacrm
      DATABASE_URL_ADMIN_SYNC: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/supacrm
      DATABASE_URL_ADMIN_ASYNC: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/supacrm
      APP_USER_DSN: postgresql://supacrm_app:supacrm_app@127.0.0.1:5432/supacrm
      REDIS_URL: redis://127.0.0.1:6379/0
      BOOTSTRAP_API_KEY: ci-bootstrap-key
      JWT_SECRET: ci-jwt-secret-ci-jwt-secret-ci-jwt-secret-ci-jwt-secret
      REFRESH_TOKEN_SECRET: ci-refresh-secret-ci-refresh-secret-ci-refresh-secret
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Alembic upgrade
        working-directory: backend
        run: alembic upgrade head

      - name: Configure non-bypass RLS app role
        run: python backend/scripts/setup_ci_rls_role.py

      - name: Backend Phase 2 hardening checks
        working-directory: backend
        run: |
          python -m pytest -q \
            tests/integration/test_protected_request_transactions.py \
            tests/integration/test_system_readiness.py \
            tests/integration/test_auth_boundary.py \
            tests/integration/test_security_hardening.py \
            tests/integration/test_tenant_membership_lifecycle.py -rA

      - name: Backend DB-backed RLS checks
        working-directory: backend
        run: |
          python -m pytest -q \
            tests/integration/test_rls_business_tables_db.py \
            tests/integration/test_rls_additional_tenant_tables_db.py -rA

      - name: Check production shell entrypoints
        run: bash -n scripts/deploy.sh scripts/ops/backup_postgres.sh scripts/ops/restore_postgres.sh scripts/ops/backup_storage.sh scripts/ops/restore_storage.sh

      - name: Validate observability compose
        run: docker compose -f infrastructure/observability/docker-compose.logs.yml config

      - name: Build backend image
        run: docker build -f backend/Dockerfile backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend checks
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: /api
        run: |
          npm run lint
          npx tsc --noEmit
          npx vitest run \
            tests/auth-propagation.test.ts \
            tests/protected-route-hydration.test.tsx \
            tests/finance-amount-validation.test.tsx \
            tests/finance-invoice-flow.test.tsx \
            tests/finance-quote-create-flow.test.tsx

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile frontend
