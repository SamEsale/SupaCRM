[alembic]
script_location = alembic
prepend_sys_path = .

# placeholder; env.py sets the real URL from DATABASE_URL_SYNC
sqlalchemy.url = postgresql+psycopg2://postgres:postgres@localhost:5432/supacrm


# (Optional) If you want migration files named with timestamps
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
