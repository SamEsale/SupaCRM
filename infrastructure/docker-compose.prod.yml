x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-supacrm}
      DATABASE_ADMIN_USER: ${DATABASE_ADMIN_USER:-supacrm_admin}
      DATABASE_ADMIN_PASSWORD: ${DATABASE_ADMIN_PASSWORD:-supacrm_admin}
      DATABASE_APP_USER: ${DATABASE_APP_USER:-supacrm_app}
      DATABASE_APP_PASSWORD: ${DATABASE_APP_PASSWORD:-supacrm_app}
    volumes:
      - supacrm_prod_pgdata:/var/lib/postgresql/data
      - ./postgres/prod-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-supacrm}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: "no"
    logging: *default-logging
    env_file:
      - ${SUPACRM_ENV_FILE:-.env.production}
    environment:
      ENV: prod
    volumes:
      - ./secrets:/run/supacrm-secrets:ro
    command: ["/app/scripts/migrate.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - ${SUPACRM_ENV_FILE:-.env.production}
    environment:
      ENV: prod
      PORT: "8000"
      WEB_CONCURRENCY: "2"
    volumes:
      - ./secrets:/run/supacrm-secrets:ro
    command: ["/app/scripts/start.sh"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready').read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - ${SUPACRM_ENV_FILE:-.env.production}
    environment:
      ENV: prod
    volumes:
      - ./secrets:/run/supacrm-secrets:ro
    command: ["sh", "/app/scripts/worker.sh"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - ${SUPACRM_ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: /api
      PORT: "3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok) process.exit(1);}).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/security.conf:/etc/nginx/security.conf:ro

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    restart: unless-stopped
    logging: *default-logging
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-supacrm-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-supacrm-minio-secret}
    volumes:
      - supacrm_prod_minio_data:/data

  storage-cli:
    image: minio/mc:latest
    restart: "no"
    logging: *default-logging
    entrypoint: ["/bin/sh", "-lc"]
    env_file:
      - ${SUPACRM_ENV_FILE:-.env.production}
    environment:
      MINIO_ENDPOINT: http://minio:9000
    volumes:
      - ../backups/storage:/backups/storage

volumes:
  supacrm_prod_pgdata:
  supacrm_prod_minio_data:
