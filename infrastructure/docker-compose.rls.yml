version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: supacrm-rls-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: supacrm
    ports:
      - "5432:5432"
    volumes:
      - supacrm_rls_pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d supacrm"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  supacrm_rls_pgdata:
